<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nighthawk</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <!-- <script src="https://unpkg.com/lucide@latest"></script> -->
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <aside id="sidebar"
        class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-gray-800 shadow-lg transform transition-transform duration-300">
        <div class="p-4 border-b dark:border-gray-700">
            <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100">Nighthawk</h1>
        </div>
        <nav class="p-4">
            <ul class="space-y-2">
                <li>
                    <a href="#"
                        class="flex items-center p-2 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                        <i data-lucide="home" class="w-5 h-5 mr-3"></i>
                        Home
                    </a>
                </li>
                <li>
                    <a href="#"
                        class="flex items-center p-2 text-gray-700 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded-lg">
                        <i data-lucide="users" class="w-5 h-5 mr-3"></i>
                        Environments
                    </a>
                </li>
                <li>
                    <a href="#"
                        class="flex items-center p-2 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                        <i data-lucide="bar-chart-2" class="w-5 h-5 mr-3"></i>
                        Analytics
                    </a>
                </li>
                <li>
                    <a href="#"
                        class="flex items-center p-2 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                        <i data-lucide="settings" class="w-5 h-5 mr-3"></i>
                        Settings
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <div id="main-content" class="ml-64 transition-margin duration-300">
        <header class="bg-white dark:bg-gray-800 shadow-sm">
            <div class="flex items-center justify-between p-4">
                <button id="toggle-sidebar" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center space-x-4">
                    <button class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 relative">
                        <i data-lucide="bell" class="w-6 h-6"></i>
                        <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="w-8 h-8 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
                </div>
            </div>
        </header>

        <main class="p-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                    <h2 class="text-lg font-semibold text-gray-100 mb-4">Checks</h2>
                    <form id="promptForm" class="space-y-4">
                        <div>
                            <textarea id="promptInput" rows="6"
                                class="w-full p-3 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                                placeholder="Enter your prompt here..."></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                            Submit
                        </button>

                        <div id="loading" class="hidden flex justify-center mt-2" role="status">
                            <svg aria-hidden="true"
                                class="w-8 h-8 text-gray-200 animate-spin dark:text-gray-600 fill-blue-600"
                                viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                                    fill="currentColor" />
                                <path
                                    d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                                    fill="currentFill" />
                            </svg>
                        </div>
                    </form>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                    <h2 class="text-lg font-semibold text-gray-100 mb-4">Results</h2>
                    <div id="accordionContainer" class="space-y-2"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        //lucide.createIcons();

        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const toggleButton = document.getElementById('toggle-sidebar');
        const loadingIndicator = document.getElementById('loading');

        toggleButton.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
            mainContent.classList.toggle('ml-0');
            mainContent.classList.toggle('ml-64');
        });

        document.getElementById('promptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('promptInput').value;
            loadingIndicator.classList.remove('hidden');

            try {
                const response = await fetch('http://127.0.0.1:8080/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt }),
                });
                const data = await response.json();
                updateAccordions(data);
            } catch (error) {
                console.error('Error:', error);
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        });

        function updateAccordions(results) {
            const container = document.getElementById('accordionContainer');
            container.innerHTML = '';

            results.probes.forEach((probe, index) => {
                const accordion = document.createElement('div');
                accordion.className = 'border border-gray-200 rounded-lg';
                accordion.innerHTML = `
                    <button class="w-full p-4 text-left font-medium text-white bg-gray-700 hover:bg-gray-600 focus:outline-none" onclick="toggleAccordion(${index})">
                        <b>${probe.host}</b> - ${probe.name}
                        <i data-lucide="chevron-down" class="float-right w-5 h-5"></i>
                    </button>
                    <div id="accordion-content-${index}" class="hidden p-4 border-t border-gray-200">
                        <pre>${probe.config}</pre>
                    </div>
                `;
                container.appendChild(accordion);
            });
            Prism.highlightAll();
            lucide.createIcons();
        }
        // Function to toggle accordion
        function toggleAccordion(index) {
            const content = document.getElementById(`accordion-content-${index}`);
            content.classList.toggle('hidden');
        }
    </script>
</body>

</html>
